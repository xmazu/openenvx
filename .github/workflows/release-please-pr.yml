name: Release Please - Prepare Release

on:
  # Manual trigger only - YOU decide when to prepare release
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Only create PR, don't do releases automatically
          skip-github-release: true
          skip-github-pull-request: false
