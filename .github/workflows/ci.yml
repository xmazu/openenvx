name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-envx:
    name: Test envx
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go mod download
      - run: go test -v ./...
      - run: go build -v ./...

  # oexctl tests disabled - using portless instead
  # test-runtime:
  #   name: Test runtime (oexctl)
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: runtime
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: "1.24"
  #     - run: go mod download
  #     - run: go test -v ./...
  #     - run: go build -v ./...

  test-js:
    name: Test JS Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run test
      - run: bun run typecheck
      - run: bunx biome check .
