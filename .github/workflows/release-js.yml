name: Release JavaScript

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-changesets:
    name: Check for Changesets
    runs-on: ubuntu-latest
    outputs:
      has-changesets: ${{ steps.check.outputs.has-changesets }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check for changeset files
        id: check
        run: |
          if ls .changeset/*.md 1> /dev/null 2>&1; then
            # Check if there are any changeset files other than README.md
            changesets=$(ls .changeset/*.md | grep -v "README.md" || true)
            if [ -n "$changesets" ]; then
              echo "has-changesets=true" >> "$GITHUB_OUTPUT"
              echo "Found changeset files:"
              echo "$changesets"
            else
              echo "has-changesets=false" >> "$GITHUB_OUTPUT"
              echo "No changeset files found (only README.md)"
            fi
          else
            echo "has-changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changeset files found"
          fi

  test:
    name: Test
    needs: check-changesets
    if: needs.check-changesets.outputs.has-changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: bun run build

      - name: Type Check openenvx package
        working-directory: packages/openenvx
        run: bunx tsc --noEmit

      - name: Type Check landing app
        working-directory: apps/landing
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx biome check .

  release:
    name: Release to NPM
    needs: [check-changesets, test]
    if: needs.check-changesets.outputs.has-changesets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: bun run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
