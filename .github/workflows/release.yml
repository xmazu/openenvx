name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Release openenvx
        run: |
          VERSION=$(jq -r '.version' packages/openenvx/package.json)
          TAG="openenvx-v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            bun install && bun run build
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            cd packages/openenvx && npm publish --access public
            cd ../..
            gh release create "$TAG" --title "openenvx v$VERSION" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release envtyped
        run: |
          VERSION=$(jq -r '.version' packages/envtyped/package.json)
          TAG="envtyped-v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            bun install && bun run build
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            cd packages/envtyped && npm publish --access public
            cd ../..
            gh release create "$TAG" --title "envtyped v$VERSION" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # oexctl release disabled - using portless instead
      # - name: Release oexctl
      #   run: |
      #     VERSION=$(cat runtime/VERSION)
      #     TAG="oexctl-v$VERSION"
      #     if ! git rev-parse "$TAG" >/dev/null 2>&1; then
      #       mkdir -p dist
      #       for os in darwin linux; do
      #         for arch in amd64 arm64; do
      #           GOOS=$os GOARCH=$arch go build -C runtime -ldflags "-X main.Version=$VERSION" -o ../dist/oexctl-${os}-${arch} .
      #         done
      #       done
      #       gh release create "$TAG" --title "oexctl v$VERSION" --generate-notes dist/*
      #       rm -rf dist
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release envx
        run: |
          VERSION=$(cat envx/VERSION 2>/dev/null || echo "0.3.0")
          TAG="envx-v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            mkdir -p dist
            for os in darwin linux; do
              for arch in amd64 arm64; do
                GOOS=$os GOARCH=$arch go build -C envx -ldflags "-X main.Version=$VERSION" -o ../dist/envx-${os}-${arch} .
              done
            done
            gh release create "$TAG" --title "envx v$VERSION" --generate-notes dist/*
            rm -rf dist
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
